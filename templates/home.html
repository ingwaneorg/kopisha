{% extends 'base.html' %}

{% block title %}VM Paste{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">

      <div class="text-center mb-4">
        <h1 class="display-4 mb-2">VM Paste</h1>
        <p class="lead text-muted">Clipboard relay for online training sessions.</p>
      </div>

      <div class="card">
        <div class="card-body bg-body-tertiary text-center">
          <p class="text-muted mb-1">If you're a learner, your tutor will give you the correct link.</p>
          <small class="text-muted">v{{ version }}</small>
        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
