{% extends "base.html" %}

{% block title %}Kopisha - Tutor{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <h3 class="mb-3">Tutor ~ Copy &amp; Paste</h3>

      <div class="card">
        <div class="card-body bg-body-tertiary">

          <div class="mb-3">
            <textarea id="links-input"
                      class="form-control font-monospace"
                      rows="3"
                      placeholder="Links (one URL per line)...">{{ '\n'.join(clip.links) }}</textarea>
          </div>

          <div class="mb-3">
            <textarea id="clip-input"
                      class="form-control font-monospace"
                      rows="6"
                      maxlength="1000"
                      placeholder="Paste your text here...">{{ clip.text }}</textarea>
          </div>

          <div class="d-flex gap-2 mb-3">
            <button onclick="publishClip()" class="btn btn-success flex-fill">Publish</button>
            <button onclick="clearClip()" class="btn btn-danger flex-fill">Clear</button>
          </div>

          <div class="text-center">
            <small id="status-message" class="text-muted">&nbsp;</small>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const tutorPath = window.location.pathname;

function publishClip() {
    const text = document.getElementById('clip-input').value.trim();
    const linksRaw = document.getElementById('links-input').value;
    const links = linksRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

    fetch(tutorPath, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, links: links })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            document.getElementById('status-message').textContent =
                `Published at ${new Date().toLocaleTimeString()}`;
        }
    })
    .catch(error => {
        document.getElementById('status-message').textContent = 'Publish failed - try again';
    });
}

function clearClip() {
    document.getElementById('clip-input').value = '';
    document.getElementById('links-input').value = '';
    publishClip();
}
</script>
{% endblock %}
